<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Square-Up Calculator</title>
  <meta name="description" content="Launch the Square-Up Calculator for field layout and diagonal measurements." />
  <meta http-equiv="refresh" content="0; url=./square-up-calculator.html" />
  <link rel="canonical" href="./square-up-calculator.html" />
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.16), transparent 30%),
        linear-gradient(to bottom, #fffaf5, #f1f5f9);
      color: #0f172a;
    }

    main {
      width: min(100%, 680px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #e2e8f0;
      border-radius: 32px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 16px 0 0;
      font-size: 1.05rem;
      line-height: 1.7;
      color: #475569;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening Square-Up Calculator</h1>
    <p>If the calculator does not open automatically, use the button below.</p>
    <a href="./square-up-calculator.html">Open Calculator</a>
  </main>

  <script>
    window.location.replace("./square-up-calculator.html");
  </script>
</body>
</html>
